<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolchain | CYBERFLIPPER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
</head>
<body class="theme-dark">
    <div id="matrix-rain" class="dash-matrix-rain"></div>
    <div class="hud-scanner"></div>
    
    <nav class="p-4 d-flex justify-content-center">
        <a href="index.html" class="nav-anchor">DASHBOARD</a>
        <a href="toolchain.html" class="nav-anchor active">TOOLCHAIN</a>
        <a href="intel.html" class="nav-anchor">INTEL</a>
        <a href="stats.html" class="nav-anchor">STATS</a>
        <a href="download.html" class="nav-anchor">DEPLOY</a>
        <a href="about.html" class="nav-anchor">ABOUT</a>
    </nav>

    <div class="container py-5">
        <div class="row mb-5">
            <div class="col-12 text-center">
                <h1 class="hud-label text-cyan display-3">[ F-SERIES_TOOLCHAIN ]</h1>
                <p class="text-white-50">Industrial Engineering Visuals & Passive Signal Telemetry.</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-12">
                <div class="terminal-card electric-border p-5 mb-4">
                    <div class="schematic-wrapper" style="height: 400px; background: radial-gradient(circle at center, rgba(0, 243, 255, 0.05), transparent);">
                        <!-- Rotating 3D Mesh Simulation -->
                        <div class="h-100 d-flex justify-content-center align-items-center" style="perspective: 1000px;">
                            <div class="mesh-cube" style="width: 200px; height: 200px; border: 1px solid var(--cyber-cyan); animation: mesh-rotate 10s infinite linear;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="terminal-card p-4">
                    <h5 class="hud-label text-purple mb-3">FFT_LIVE_INGESTION</h5>
                    <canvas id="fftCanvas" style="width: 100%; height: 200px;"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="terminal-card p-4">
                    <h5 class="hud-label text-cyan mb-3">NODE_TELEMETRY</h5>
                    <div id="liveTerminal" class="text-success small" style="height: 200px; overflow: hidden; font-family: monospace;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
