name: CYBERFLIPPER Release Publisher
on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  attach-assets:
    name: Build & Attach Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Apps
        run: python3 validate_apps.py || true

      - name: Build Release Package
        run: |
          python3 package.py
          echo "Package built:"
          ls -lh dist/

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum *.tgz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CYBERFLIPPER-*.tgz
            dist/SHA256SUMS.txt
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## CYBERFLIPPER Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          for f in dist/*; do
            size=$(du -h "$f" | cut -f1)
            echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
          done
