// This GitHub Action fetches the Lab401 product catalog and updates the local JSON file
name: Update Lab401 Catalog

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 3am UTC
  workflow_dispatch:

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Fetch Lab401 Catalog
        run: |
          python .github/scripts/fetch_lab401_catalog.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add CYBERFLIPPER/assets/lab401_catalog.json
          git commit -m "Update Lab401 catalog JSON [auto]" || echo "No changes to commit"
          git push
