name: 🛡️ Community Moderator
on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: 👋 Welcome Contributor
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "⚡ **CYBERFLIPPER System Notice** ⚡ @${{ github.actor }}, thank you for contributing to the FLLC ecosystem. Our team (Personfu) will review this shortly. Visit [fllc.net](https://fllc.net) for official updates."
          pr-message: "⚡ **CYBERFLIPPER System Notice** ⚡ @${{ github.actor }}, thank you for the PR. All code must adhere to FLLC hardware standards. [Personfu] will audit these changes."

  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v4
        with:
          stale-issue-message: "This issue is stale because it has been open 30 days with no activity. Removing from active protocol."
          days-before-stale: 30
          days-before-close: 7
