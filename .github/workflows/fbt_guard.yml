name: 🛠️ FBT Integrity Guard
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate_apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 🔍 Scan Application Manifests
        run: |
          find apps/ -name "application.fam" -exec echo "Checking: {}" \;
          # Add logic to check for required fields in FAM files
          grep -r "appid" apps/ > /dev/null || (echo "Error: Missing appid" && exit 1)
          grep -r "apptype" apps/ > /dev/null || (echo "Error: Missing apptype" && exit 1)
          echo "Manifest Integrity: VALID"
